# Future You — curated universe seed (Phase 2, DATA.md / SWITZERLAND.md)
#
# UCITS-first, Swiss-appropriate, GLOBALLY diversified (not Swiss-only). This file
# holds the human-authored REFERENCE + identity data only. The refresh script
# (scripts/refresh_universe.py) merges in MARKET data from yfinance (price, beta,
# market cap, profitability, dividend, first-trade date) and computes the
# safe-universe screen, producing data/snapshots/universe.json.
#
# ACCURACY (CLAUDE.md, DATA.md): every reference figure below was read from the
# instrument's justETF profile on the citation's as_of date — never typed from
# memory, never invented. `ter` is a decimal (0.0007 = 0.07%). `aum` is the
# justETF fund size in EUR (the screen only needs the >=100m floor; the exact
# currency is noted in the citation). The refresh cross-checks each stock's ISIN
# against yfinance and fails loudly on a mismatch, and validates that every
# `ticker` actually returns price data.
#
# CMA mapping note: `asset_class` is the bridge to the capital-market assumptions
# (cma.yaml). A few instruments map to a broader proxy class so the CMA stays a
# tractable, fully-sourced set: Pacific-ex-Japan and World-Small-Cap map to
# `world_equity`; the US tech sector maps to `us_equity`. The granular exposure is
# preserved in `exposure` and explained in the bilingual content.

