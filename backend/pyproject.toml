[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
# Our own packages, so the engine imports group separately from third-party.
known-first-party = ["app", "core", "tests"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
warn_unused_ignores = true

# core/ (the finance engine) is tightened to strict typing in Phase 1: every
# function fully annotated, no implicit Any leaking out of our own code.
[[tool.mypy.overrides]]
module = ["core.*"]
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_calls = true
check_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
disallow_any_generics = true

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
